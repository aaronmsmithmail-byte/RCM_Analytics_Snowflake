name: Deploy to Snowflake

on:
  push:
    branches: [main]
    paths:
      - 'snowflake/**'
      - '.github/workflows/deploy-snowflake.yml'
  workflow_dispatch:

# ── Shared Snowflake connection config ──────────────────────────────
# Defined once here, inherited by all jobs via the 'Configure' step.
env:
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
  SNOWFLAKE_DATABASE: RCM_ANALYTICS
  SNOWFLAKE_SCHEMA: STAGING
  SNOWFLAKE_WAREHOUSE: RCM_WH
  SNOWFLAKE_ROLE: SYSADMIN

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Gate: Lint & Test (must pass before any deployment)
  # ────────────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate sample data
        run: python generate_sample_data.py

      - name: Lint
        run: ruff check snowflake/streamlit/ generate_sample_data.py

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ────────────────────────────────────────────────────────────────────
  # Phase 1: Deploy DDL (schemas, tables, views, stages)
  # ────────────────────────────────────────────────────────────────────
  deploy-ddl:
    name: Deploy DDL
    needs: lint-and-test
    runs-on: ubuntu-latest
    environment: snowflake-prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        uses: Snowflake-Labs/snowflake-cli-action@v1.5
        with:
          cli-version: "latest"
          default-config-file-path: "snowflake.yml"

      - name: Configure Snowflake connection
        run: |
          python3 - << 'PYEOF'
          import os, stat, pathlib
          cfg = pathlib.Path.home() / ".snowflake" / "config.toml"
          cfg.parent.mkdir(parents=True, exist_ok=True)
          cfg.write_text(
              "[connections.default]\n"
              f'account = "{os.environ["SNOWFLAKE_ACCOUNT"]}"\n'
              f'user = "{os.environ["SNOWFLAKE_USER"]}"\n'
              f'password = "{os.environ["SNOWFLAKE_PASSWORD"]}"\n'
              f'database = "{os.environ["SNOWFLAKE_DATABASE"]}"\n'
              f'schema = "{os.environ["SNOWFLAKE_SCHEMA"]}"\n'
              f'warehouse = "{os.environ["SNOWFLAKE_WAREHOUSE"]}"\n'
              f'role = "{os.environ["SNOWFLAKE_ROLE"]}"\n'
          )
          cfg.chmod(stat.S_IRUSR | stat.S_IWUSR)
          PYEOF

      - name: Deploy environment setup
        run: snow sql -f snowflake/setup/00_environment.sql

      - name: Deploy Bronze DDL
        run: snow sql -f snowflake/ddl/01_bronze_tables.sql

      - name: Deploy Silver DDL
        run: snow sql -f snowflake/ddl/02_silver_tables.sql

      - name: Deploy Gold views
        run: snow sql -f snowflake/ddl/03_gold_views.sql

      - name: Deploy Metadata tables
        run: snow sql -f snowflake/ddl/04_metadata_tables.sql

      - name: Deploy Stages
        run: snow sql -f snowflake/ddl/05_stages.sql

  # ────────────────────────────────────────────────────────────────────
  # Phase 2: Deploy ETL (stored procedures, metadata, catalog, tasks)
  # ────────────────────────────────────────────────────────────────────
  deploy-etl:
    name: Deploy ETL & Metadata
    needs: deploy-ddl
    runs-on: ubuntu-latest
    environment: snowflake-prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        uses: Snowflake-Labs/snowflake-cli-action@v1.5
        with:
          cli-version: "latest"
          default-config-file-path: "snowflake.yml"

      - name: Configure Snowflake connection
        run: |
          python3 - << 'PYEOF'
          import os, stat, pathlib
          cfg = pathlib.Path.home() / ".snowflake" / "config.toml"
          cfg.parent.mkdir(parents=True, exist_ok=True)
          cfg.write_text(
              "[connections.default]\n"
              f'account = "{os.environ["SNOWFLAKE_ACCOUNT"]}"\n'
              f'user = "{os.environ["SNOWFLAKE_USER"]}"\n'
              f'password = "{os.environ["SNOWFLAKE_PASSWORD"]}"\n'
              f'database = "{os.environ["SNOWFLAKE_DATABASE"]}"\n'
              f'schema = "{os.environ["SNOWFLAKE_SCHEMA"]}"\n'
              f'warehouse = "{os.environ["SNOWFLAKE_WAREHOUSE"]}"\n'
              f'role = "{os.environ["SNOWFLAKE_ROLE"]}"\n'
          )
          cfg.chmod(stat.S_IRUSR | stat.S_IWUSR)
          PYEOF

      - name: Deploy Stage→Bronze stored procedure
        run: snow sql -f snowflake/etl/load_stage_to_bronze.sql

      - name: Deploy Bronze→Silver stored procedure
        run: snow sql -f snowflake/etl/transform_bronze_to_silver.sql

      - name: Deploy daily ETL task
        run: snow sql -f snowflake/etl/tasks.sql

      - name: Seed metadata (KPI catalog, semantic layer, knowledge graph)
        run: snow sql -f snowflake/etl/seed_metadata.sql

      - name: Deploy Horizon Data Catalog (tags, comments, PII classification)
        run: snow sql -f snowflake/catalog/tags_and_comments.sql

  # ────────────────────────────────────────────────────────────────────
  # Phase 2b: Generate sample data, upload to stage, and run ETL
  # ────────────────────────────────────────────────────────────────────
  load-sample-data:
    name: Load Sample Data
    needs: deploy-etl
    runs-on: ubuntu-latest
    environment: snowflake-prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Snowflake CLI
        uses: Snowflake-Labs/snowflake-cli-action@v1.5
        with:
          cli-version: "latest"
          default-config-file-path: "snowflake.yml"

      - name: Configure Snowflake connection
        run: |
          python3 - << 'PYEOF'
          import os, stat, pathlib
          cfg = pathlib.Path.home() / ".snowflake" / "config.toml"
          cfg.parent.mkdir(parents=True, exist_ok=True)
          cfg.write_text(
              "[connections.default]\n"
              f'account = "{os.environ["SNOWFLAKE_ACCOUNT"]}"\n'
              f'user = "{os.environ["SNOWFLAKE_USER"]}"\n'
              f'password = "{os.environ["SNOWFLAKE_PASSWORD"]}"\n'
              f'database = "{os.environ["SNOWFLAKE_DATABASE"]}"\n'
              f'schema = "{os.environ["SNOWFLAKE_SCHEMA"]}"\n'
              f'warehouse = "{os.environ["SNOWFLAKE_WAREHOUSE"]}"\n'
              f'role = "{os.environ["SNOWFLAKE_ROLE"]}"\n'
          )
          cfg.chmod(stat.S_IRUSR | stat.S_IWUSR)
          PYEOF

      - name: Generate sample CSV data
        run: python generate_sample_data.py

      - name: Upload CSVs to Snowflake stage
        run: |
          for csv in data/*.csv; do
            echo "Uploading $csv..."
            snow stage copy "$csv" @RCM_ANALYTICS.STAGING.RCM_STAGE --overwrite
          done

      - name: Clear pipeline tracking for fresh timestamps
        run: snow sql -q "TRUNCATE TABLE IF EXISTS RCM_ANALYTICS.METADATA.PIPELINE_RUNS;"

      - name: Run Stage→Bronze ETL
        run: snow sql -q "CALL RCM_ANALYTICS.STAGING.SP_LOAD_STAGE_TO_BRONZE();"

      - name: Run Bronze→Silver ETL
        run: snow sql -q "CALL RCM_ANALYTICS.STAGING.SP_BRONZE_TO_SILVER();"

      - name: Verify row counts
        run: |
          snow sql -q "
            SELECT 'SILVER.PAYERS' AS tbl, COUNT(*) AS row_count FROM RCM_ANALYTICS.SILVER.PAYERS
            UNION ALL SELECT 'SILVER.PATIENTS', COUNT(*) FROM RCM_ANALYTICS.SILVER.PATIENTS
            UNION ALL SELECT 'SILVER.CLAIMS', COUNT(*) FROM RCM_ANALYTICS.SILVER.CLAIMS
            UNION ALL SELECT 'SILVER.PAYMENTS', COUNT(*) FROM RCM_ANALYTICS.SILVER.PAYMENTS
            UNION ALL SELECT 'SILVER.DENIALS', COUNT(*) FROM RCM_ANALYTICS.SILVER.DENIALS
            ORDER BY tbl;
          "

  # ────────────────────────────────────────────────────────────────────
  # Phase 3a: Deploy Cortex Analyst semantic model
  # ────────────────────────────────────────────────────────────────────
  deploy-cortex-model:
    name: Deploy Cortex Analyst Model
    needs: load-sample-data
    runs-on: ubuntu-latest
    environment: snowflake-prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        uses: Snowflake-Labs/snowflake-cli-action@v1.5
        with:
          cli-version: "latest"

      - name: Configure Snowflake connection
        run: |
          python3 - << 'PYEOF'
          import os, stat, pathlib
          cfg = pathlib.Path.home() / ".snowflake" / "config.toml"
          cfg.parent.mkdir(parents=True, exist_ok=True)
          cfg.write_text(
              "[connections.default]\n"
              f'account = "{os.environ["SNOWFLAKE_ACCOUNT"]}"\n'
              f'user = "{os.environ["SNOWFLAKE_USER"]}"\n'
              f'password = "{os.environ["SNOWFLAKE_PASSWORD"]}"\n'
              f'database = "{os.environ["SNOWFLAKE_DATABASE"]}"\n'
              f'schema = "{os.environ["SNOWFLAKE_SCHEMA"]}"\n'
              f'warehouse = "{os.environ["SNOWFLAKE_WAREHOUSE"]}"\n'
              f'role = "{os.environ["SNOWFLAKE_ROLE"]}"\n'
          )
          cfg.chmod(stat.S_IRUSR | stat.S_IWUSR)
          PYEOF

      - name: Stage Cortex Analyst semantic model
        run: |
          snow stage copy snowflake/cortex/rcm_semantic_model.yaml \
            @RCM_ANALYTICS.STAGING.RCM_STAGE/cortex/ \
            --overwrite

  # ────────────────────────────────────────────────────────────────────
  # Phase 3b: Deploy Streamlit app (fetch Git repo so SiS picks up changes)
  # ────────────────────────────────────────────────────────────────────
  deploy-streamlit:
    name: Deploy Streamlit App
    needs: load-sample-data
    runs-on: ubuntu-latest
    environment: snowflake-prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        uses: Snowflake-Labs/snowflake-cli-action@v1.5
        with:
          cli-version: "latest"

      - name: Configure Snowflake connection
        run: |
          python3 - << 'PYEOF'
          import os, stat, pathlib
          cfg = pathlib.Path.home() / ".snowflake" / "config.toml"
          cfg.parent.mkdir(parents=True, exist_ok=True)
          cfg.write_text(
              "[connections.default]\n"
              f'account = "{os.environ["SNOWFLAKE_ACCOUNT"]}"\n'
              f'user = "{os.environ["SNOWFLAKE_USER"]}"\n'
              f'password = "{os.environ["SNOWFLAKE_PASSWORD"]}"\n'
              f'database = "{os.environ["SNOWFLAKE_DATABASE"]}"\n'
              f'schema = "{os.environ["SNOWFLAKE_SCHEMA"]}"\n'
              f'warehouse = "{os.environ["SNOWFLAKE_WAREHOUSE"]}"\n'
              f'role = "{os.environ["SNOWFLAKE_ROLE"]}"\n'
          )
          cfg.chmod(stat.S_IRUSR | stat.S_IWUSR)
          PYEOF

      - name: Fetch latest code into Snowflake Git repo
        run: |
          snow sql -q "ALTER GIT REPOSITORY RCM_ANALYTICS.STAGING.RCM_REPO FETCH;"

      - name: Deploy Streamlit app
        run: |
          cd snowflake/streamlit
          snow streamlit deploy \
            --replace \
            --database RCM_ANALYTICS \
            --schema STAGING \
            --warehouse RCM_WH

  # ────────────────────────────────────────────────────────────────────
  # Phase 4: Post-deploy verification (smoke tests)
  # ────────────────────────────────────────────────────────────────────
  verify-deployment:
    name: Verify Deployment
    needs: [deploy-cortex-model, deploy-streamlit]
    runs-on: ubuntu-latest
    environment: snowflake-prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        uses: Snowflake-Labs/snowflake-cli-action@v1.5
        with:
          cli-version: "latest"

      - name: Configure Snowflake connection
        run: |
          python3 - << 'PYEOF'
          import os, stat, pathlib
          cfg = pathlib.Path.home() / ".snowflake" / "config.toml"
          cfg.parent.mkdir(parents=True, exist_ok=True)
          cfg.write_text(
              "[connections.default]\n"
              f'account = "{os.environ["SNOWFLAKE_ACCOUNT"]}"\n'
              f'user = "{os.environ["SNOWFLAKE_USER"]}"\n'
              f'password = "{os.environ["SNOWFLAKE_PASSWORD"]}"\n'
              f'database = "{os.environ["SNOWFLAKE_DATABASE"]}"\n'
              f'schema = "{os.environ["SNOWFLAKE_SCHEMA"]}"\n'
              f'warehouse = "{os.environ["SNOWFLAKE_WAREHOUSE"]}"\n'
              f'role = "{os.environ["SNOWFLAKE_ROLE"]}"\n'
          )
          cfg.chmod(stat.S_IRUSR | stat.S_IWUSR)
          PYEOF

      - name: Verify Bronze tables exist (10 expected)
        run: |
          snow sql -q "
            SELECT COUNT(*) AS table_count
            FROM INFORMATION_SCHEMA.TABLES
            WHERE TABLE_CATALOG = 'RCM_ANALYTICS'
              AND TABLE_SCHEMA = 'BRONZE'
              AND TABLE_TYPE = 'BASE TABLE';
          "

      - name: Verify Silver tables exist (10 expected)
        run: |
          snow sql -q "
            SELECT COUNT(*) AS table_count
            FROM INFORMATION_SCHEMA.TABLES
            WHERE TABLE_CATALOG = 'RCM_ANALYTICS'
              AND TABLE_SCHEMA = 'SILVER'
              AND TABLE_TYPE = 'BASE TABLE';
          "

      - name: Verify Gold views exist (5 expected)
        run: |
          snow sql -q "
            SELECT COUNT(*) AS view_count
            FROM INFORMATION_SCHEMA.VIEWS
            WHERE TABLE_CATALOG = 'RCM_ANALYTICS'
              AND TABLE_SCHEMA = 'GOLD';
          "

      - name: Verify Metadata tables populated
        run: |
          snow sql -q "
            SELECT
              (SELECT COUNT(*) FROM RCM_ANALYTICS.METADATA.KPI_CATALOG) AS kpi_count,
              (SELECT COUNT(*) FROM RCM_ANALYTICS.METADATA.SEMANTIC_LAYER) AS semantic_count,
              (SELECT COUNT(*) FROM RCM_ANALYTICS.METADATA.KG_NODES) AS kg_node_count,
              (SELECT COUNT(*) FROM RCM_ANALYTICS.METADATA.KG_EDGES) AS kg_edge_count;
          "

      - name: Verify Cortex semantic model is staged
        run: |
          snow sql -q "LS @RCM_ANALYTICS.STAGING.RCM_STAGE/cortex/;"

      - name: Verify stored procedures exist
        run: |
          snow sql -q "
            SELECT PROCEDURE_NAME
            FROM INFORMATION_SCHEMA.PROCEDURES
            WHERE PROCEDURE_CATALOG = 'RCM_ANALYTICS'
              AND PROCEDURE_SCHEMA = 'STAGING'
            ORDER BY PROCEDURE_NAME;
          "

      - name: Deployment verified
        run: echo "All post-deploy verification checks passed."
