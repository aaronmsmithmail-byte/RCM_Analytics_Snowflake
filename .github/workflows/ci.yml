name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff>=0.8.0

      - name: Check linting rules
        run: ruff check snowflake/streamlit/ tests/ generate_sample_data.py

      - name: Check formatting
        run: ruff format --check snowflake/streamlit/ tests/ generate_sample_data.py

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate sample data
        run: python generate_sample_data.py

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=snowflake/streamlit/src --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Coverage summary
        if: always()
        run: |
          python -m coverage report --format=markdown >> $GITHUB_STEP_SUMMARY || true

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run Bandit security scan
        run: bandit -r snowflake/streamlit/ -c bandit.toml --severity-level medium

      - name: Check dependencies for vulnerabilities
        run: pip-audit -r requirements.txt

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always
