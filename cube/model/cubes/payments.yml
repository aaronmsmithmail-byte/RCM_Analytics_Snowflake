cubes:
  - name: payments
    sql_table: silver_payments
    description: >
      Payments received against claims from payers via ERA/835. Drives collection
      rate, payment accuracy, and underpayment analysis.

    joins:
      - name: claims
        sql: "{CUBE}.claim_id = {claims}.claim_id"
        relationship: many_to_one

      - name: payers
        sql: "{CUBE}.payer_id = {payers}.payer_id"
        relationship: many_to_one

    measures:
      - name: count
        type: count
        description: Total number of payment transactions

      - name: total_payments
        sql: payment_amount
        type: sum
        description: Sum of all payment amounts received

      - name: total_allowed
        sql: allowed_amount
        type: sum
        description: Sum of allowed amounts from payer contracts

      - name: accurate_count
        sql: is_accurate_payment
        type: sum
        description: Number of payments matching contracted amount

      - name: payment_accuracy_rate
        sql: "{accurate_count} * 100.0 / NULLIF({count}, 0)"
        type: number
        description: "Percentage of payments matching contract — benchmark: >95%"

      - name: total_underpaid
        sql: "CASE WHEN allowed_amount > payment_amount THEN allowed_amount - payment_amount ELSE 0 END"
        type: sum
        description: Sum of underpayment gaps (allowed - paid)

    dimensions:
      - name: payment_id
        sql: payment_id
        type: string
        primary_key: true

      - name: payment_date
        sql: payment_date
        type: time

      - name: payment_method
        sql: payment_method
        type: string

      - name: claim_id
        sql: claim_id
        type: string

      - name: period
        sql: "strftime(CAST(payment_date AS DATE), '%Y-%m')"
        type: string
