cubes:
  - name: providers
    sql_table: silver_providers
    description: >
      Clinician roster. Reference dimension for provider performance
      scorecards and department-level analysis.

    measures:
      - name: count
        type: count
        description: Total number of providers

    dimensions:
      - name: provider_id
        sql: provider_id
        type: string
        primary_key: true

      - name: provider_name
        sql: provider_name
        type: string

      - name: npi
        sql: npi
        type: string

      - name: department
        sql: department
        type: string

      - name: specialty
        sql: specialty
        type: string
