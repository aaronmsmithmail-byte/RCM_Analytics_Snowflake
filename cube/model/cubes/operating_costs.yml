cubes:
  - name: operating_costs
    sql_table: silver_operating_costs
    description: >
      Monthly RCM department operating costs. Drives cost-to-collect
      calculation (total RCM cost / total collections).

    measures:
      - name: total_rcm_cost
        sql: total_rcm_cost
        type: sum
        description: Total monthly RCM operating cost

      - name: billing_staff_cost
        sql: billing_staff_cost
        type: sum

      - name: software_cost
        sql: software_cost
        type: sum

      - name: outsourcing_cost
        sql: outsourcing_cost
        type: sum

      - name: supplies_overhead
        sql: supplies_overhead
        type: sum

    dimensions:
      - name: period
        sql: period
        type: string
        primary_key: true
        description: "YYYY-MM format"
