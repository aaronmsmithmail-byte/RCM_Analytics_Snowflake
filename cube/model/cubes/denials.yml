cubes:
  - name: denials
    sql_table: silver_denials
    description: >
      Claim denials with reason codes and appeal tracking. Drives denial analysis,
      appeal success rate, and revenue recovery metrics.

    joins:
      - name: claims
        sql: "{CUBE}.claim_id = {claims}.claim_id"
        relationship: many_to_one

    measures:
      - name: count
        type: count
        description: Total number of denial records

      - name: total_denied
        sql: denied_amount
        type: sum
        description: Sum of denied dollar amounts

      - name: total_recovered
        sql: recovered_amount
        type: sum
        description: Sum of recovered amounts from successful appeals

      - name: won_count
        sql: "CASE WHEN appeal_status = 'Won' THEN 1 ELSE 0 END"
        type: sum
        description: Number of appeals won

      - name: appealed_count
        sql: "CASE WHEN appeal_status IS NOT NULL THEN 1 ELSE 0 END"
        type: sum
        description: Number of denials that were appealed

      - name: appeal_success_rate
        sql: "{won_count} * 100.0 / NULLIF({appealed_count}, 0)"
        type: number
        description: "Percentage of appeals won — benchmark: >50%"

    dimensions:
      - name: denial_id
        sql: denial_id
        type: string
        primary_key: true

      - name: denial_reason_code
        sql: denial_reason_code
        type: string

      - name: denial_reason_description
        sql: denial_reason_description
        type: string

      - name: denial_date
        sql: denial_date
        type: time

      - name: appeal_status
        sql: appeal_status
        type: string
        description: "Won, Lost, or In Progress"

      - name: claim_id
        sql: claim_id
        type: string
