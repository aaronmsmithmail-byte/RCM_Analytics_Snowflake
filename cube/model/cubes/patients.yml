cubes:
  - name: patients
    sql_table: silver_patients
    description: >
      Patient demographics. Reference dimension for patient-level analysis
      and payer assignment tracking.

    joins:
      - name: payers
        sql: "{CUBE}.primary_payer_id = {payers}.payer_id"
        relationship: many_to_one

    measures:
      - name: count
        type: count
        description: Total number of patients

    dimensions:
      - name: patient_id
        sql: patient_id
        type: string
        primary_key: true

      - name: first_name
        sql: first_name
        type: string

      - name: last_name
        sql: last_name
        type: string

      - name: date_of_birth
        sql: date_of_birth
        type: time

      - name: gender
        sql: gender
        type: string

      - name: zip_code
        sql: zip_code
        type: string
