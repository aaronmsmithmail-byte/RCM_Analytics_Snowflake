cubes:
  - name: payers
    sql_table: silver_payers
    description: >
      Insurance payer master list. Reference dimension for payer analysis,
      payer mix reporting, and denial rate by payer.

    measures:
      - name: count
        type: count
        description: Total number of payers

    dimensions:
      - name: payer_id
        sql: payer_id
        type: string
        primary_key: true

      - name: payer_name
        sql: payer_name
        type: string

      - name: payer_type
        sql: payer_type
        type: string
        description: "Commercial, Government, or Self-Pay"

      - name: avg_reimbursement_pct
        sql: avg_reimbursement_pct
        type: number

      - name: contract_id
        sql: contract_id
        type: string
