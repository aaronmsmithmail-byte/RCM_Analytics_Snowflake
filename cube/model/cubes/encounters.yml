cubes:
  - name: encounters
    sql_table: silver_encounters
    description: >
      Patient visits / encounters. Links patients and providers to downstream
      charges and claims. Key dimension table for department and encounter type analysis.

    joins:
      - name: patients
        sql: "{CUBE}.patient_id = {patients}.patient_id"
        relationship: many_to_one

      - name: providers
        sql: "{CUBE}.provider_id = {providers}.provider_id"
        relationship: many_to_one

    measures:
      - name: count
        type: count
        description: Total number of patient encounters

    dimensions:
      - name: encounter_id
        sql: encounter_id
        type: string
        primary_key: true

      - name: date_of_service
        sql: date_of_service
        type: time

      - name: discharge_date
        sql: discharge_date
        type: time

      - name: encounter_type
        sql: encounter_type
        type: string
        description: "Outpatient, Inpatient, or Emergency"

      - name: department
        sql: department
        type: string
        description: Clinical department (Cardiology, Orthopedics, etc.)

      - name: patient_id
        sql: patient_id
        type: string

      - name: provider_id
        sql: provider_id
        type: string
