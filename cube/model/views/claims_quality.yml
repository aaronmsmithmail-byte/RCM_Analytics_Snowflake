views:
  - name: claims_quality
    description: >
      Claims quality view. Clean claim rate, denial rate, first-pass resolution
      rate, and charge lag. Measures the efficiency of the claims submission process.

    cubes:
      - join_path: claims
        includes:
          - count
          - denied_count
          - clean_count
          - denial_rate
          - clean_claim_rate
          - claim_status
          - date_of_service
          - period
          - fail_reason

      - join_path: charges
        prefix: true
        includes:
          - avg_charge_lag
          - count
          - total_charges
