name: rcm_analytics
description: >
  Healthcare Revenue Cycle Management (RCM) Analytics semantic model.
  Covers claims processing, payments, denials, adjustments, and operational costs
  across a medallion architecture (Bronze → Silver → Gold).

tables:
  # =========================================================================
  # Fact Tables (use dimensions + measures + time_dimensions)
  # =========================================================================

  - name: CLAIMS
    base_table:
      database: RCM_ANALYTICS
      schema: SILVER
      table: CLAIMS
    description: >
      Insurance claims submitted to payers for reimbursement. Central fact table
      for most RCM KPIs including denial rate, clean claim rate, and A/R metrics.
    dimensions:
      - name: CLAIM_ID
        expr: CLAIM_ID
        description: Unique claim identifier
        unique: true
        synonyms:
          - claim number
          - claim
      - name: ENCOUNTER_ID
        expr: ENCOUNTER_ID
        description: Reference to the patient encounter that generated this claim
      - name: PATIENT_ID
        expr: PATIENT_ID
        description: Reference to the patient who received services
      - name: PAYER_ID
        expr: PAYER_ID
        description: Reference to the insurance payer billed
      - name: DATE_OF_SERVICE
        expr: DATE_OF_SERVICE
        description: Date the healthcare service was rendered (YYYY-MM-DD)
        synonyms:
          - service date
          - DOS
      - name: SUBMISSION_DATE
        expr: SUBMISSION_DATE
        description: Date the claim was submitted to the payer (YYYY-MM-DD)
      - name: TOTAL_CHARGE_AMOUNT
        expr: TOTAL_CHARGE_AMOUNT
        description: Total billed amount for the claim in USD
        synonyms:
          - charge amount
          - billed amount
          - charges
      - name: CLAIM_STATUS
        expr: CLAIM_STATUS
        description: "Current status: Paid, Partially Paid, Denied, Pending, or Appealed"
        synonyms:
          - status
      - name: IS_CLEAN_CLAIM
        expr: IS_CLEAN_CLAIM
        description: "Boolean (1/0): claim passed all payer edits on first submission"
        synonyms:
          - clean claim
      - name: SUBMISSION_METHOD
        expr: SUBMISSION_METHOD
        description: How the claim was submitted (Electronic, Paper, Portal)
      - name: FAIL_REASON
        expr: FAIL_REASON
        description: "Reason code if not a clean claim: MISSING_AUTH, ELIGIBILITY_FAIL, CODING_ERROR, etc."
    measures:
      - name: total_claims
        expr: COUNT(DISTINCT CLAIM_ID)
        description: Total number of unique claims
        synonyms:
          - claim count
          - number of claims
      - name: total_charges
        expr: SUM(TOTAL_CHARGE_AMOUNT)
        description: Sum of all charge amounts in USD
        synonyms:
          - total billed
          - gross charges
      - name: denied_count
        expr: "SUM(CASE WHEN CLAIM_STATUS IN ('Denied', 'Appealed') THEN 1 ELSE 0 END)"
        description: Number of claims denied or appealed
      - name: clean_count
        expr: SUM(IS_CLEAN_CLAIM)
        description: Number of claims that passed payer edits on first submission
      - name: denial_rate
        expr: "SUM(CASE WHEN CLAIM_STATUS IN ('Denied', 'Appealed') THEN 1 ELSE 0 END) * 100.0 / NULLIF(COUNT(CLAIM_ID), 0)"
        description: "Percentage of claims denied — benchmark: ≤ 10%"
        synonyms:
          - deny rate
          - pct denied
      - name: clean_claim_rate
        expr: SUM(IS_CLEAN_CLAIM) * 100.0 / NULLIF(COUNT(CLAIM_ID), 0)
        description: "Percentage of clean claims — benchmark: ≥ 90%"
        synonyms:
          - first pass rate
      - name: avg_charge_lag
        expr: "AVG(DATEDIFF('day', TRY_TO_DATE(DATE_OF_SERVICE, 'YYYY-MM-DD'), TRY_TO_DATE(SUBMISSION_DATE, 'YYYY-MM-DD')))"
        description: Average days between service and claim submission
        synonyms:
          - submission lag
          - charge lag days
    time_dimensions:
      - name: date_of_service_time
        expr: TRY_TO_DATE(DATE_OF_SERVICE, 'YYYY-MM-DD')
        description: Date of service as a date type
        synonyms:
          - service date
      - name: submission_date_time
        expr: TRY_TO_DATE(SUBMISSION_DATE, 'YYYY-MM-DD')
        description: Submission date as a date type

  - name: PAYMENTS
    base_table:
      database: RCM_ANALYTICS
      schema: SILVER
      table: PAYMENTS
    description: >
      Payments received against claims from payers via ERA/835. Drives collection
      rate, payment accuracy, and underpayment analysis.
    dimensions:
      - name: PAYMENT_ID
        expr: PAYMENT_ID
        description: Unique payment identifier
        unique: true
      - name: CLAIM_ID
        expr: CLAIM_ID
        description: Reference to the claim this payment is for
      - name: PAYER_ID
        expr: PAYER_ID
        description: Reference to the payer who remitted this payment
      - name: PAYMENT_AMOUNT
        expr: PAYMENT_AMOUNT
        description: Amount paid by the payer in USD
        synonyms:
          - payment
          - amount paid
          - collection
      - name: ALLOWED_AMOUNT
        expr: ALLOWED_AMOUNT
        description: Contracted allowed amount per payer agreement in USD
        synonyms:
          - contracted amount
      - name: PAYMENT_DATE
        expr: PAYMENT_DATE
        description: Date payment was received (YYYY-MM-DD)
      - name: PAYMENT_METHOD
        expr: PAYMENT_METHOD
        description: "Payment method: EFT, Check, Virtual Card"
      - name: IS_ACCURATE_PAYMENT
        expr: IS_ACCURATE_PAYMENT
        description: "Boolean (1/0): payment matches contracted reimbursement rate"
    measures:
      - name: total_payments
        expr: SUM(PAYMENT_AMOUNT)
        description: Total payments collected in USD
        synonyms:
          - total collections
          - revenue collected
      - name: total_allowed
        expr: SUM(ALLOWED_AMOUNT)
        description: Total contracted allowed amounts in USD
      - name: payment_accuracy_rate
        expr: SUM(IS_ACCURATE_PAYMENT) * 100.0 / NULLIF(COUNT(*), 0)
        description: "Percentage of accurate payments — benchmark: ≥ 95%"
      - name: total_underpaid
        expr: "SUM(CASE WHEN PAYMENT_AMOUNT < ALLOWED_AMOUNT THEN ALLOWED_AMOUNT - PAYMENT_AMOUNT ELSE 0 END)"
        description: Total underpayment gap in USD
        synonyms:
          - underpayment amount
      - name: underpayment_rate
        expr: "SUM(CASE WHEN PAYMENT_AMOUNT < ALLOWED_AMOUNT THEN 1 ELSE 0 END) * 100.0 / NULLIF(COUNT(*), 0)"
        description: "Percentage of underpaid claims — benchmark: ≤ 5%"
    time_dimensions:
      - name: payment_date_time
        expr: TRY_TO_DATE(PAYMENT_DATE, 'YYYY-MM-DD')
        description: Payment date as a date type

  - name: DENIALS
    base_table:
      database: RCM_ANALYTICS
      schema: SILVER
      table: DENIALS
    description: >
      Claim denials with reason codes and appeal tracking. Drives denial analysis,
      appeal success rate, and revenue recovery metrics.
    dimensions:
      - name: DENIAL_ID
        expr: DENIAL_ID
        description: Unique denial identifier
        unique: true
      - name: CLAIM_ID
        expr: CLAIM_ID
        description: Reference to the denied claim
      - name: DENIAL_REASON_CODE
        expr: DENIAL_REASON_CODE
        description: "Denial reason: AUTH, DUP, ELIG, COD, TMF, MED, INFO, MOD, COORD, BUNDLE"
        synonyms:
          - reason code
          - denial code
      - name: DENIAL_REASON_DESCRIPTION
        expr: DENIAL_REASON_DESCRIPTION
        description: Human-readable denial reason
      - name: DENIAL_DATE
        expr: DENIAL_DATE
        description: Date the denial was issued (YYYY-MM-DD)
      - name: DENIED_AMOUNT
        expr: DENIED_AMOUNT
        description: Dollar amount denied by the payer in USD
      - name: APPEAL_STATUS
        expr: APPEAL_STATUS
        description: "Appeal outcome: Not Appealed, Won, Lost, or In Progress"
      - name: APPEAL_DATE
        expr: APPEAL_DATE
        description: Date the appeal was filed (YYYY-MM-DD)
      - name: RECOVERED_AMOUNT
        expr: RECOVERED_AMOUNT
        description: Amount recovered through successful appeal in USD
    measures:
      - name: total_denials
        expr: COUNT(*)
        description: Total number of denials
        synonyms:
          - denial count
      - name: total_denied
        expr: SUM(DENIED_AMOUNT)
        description: Total dollars denied in USD
      - name: total_recovered
        expr: SUM(RECOVERED_AMOUNT)
        description: Total dollars recovered through appeals in USD
      - name: appeal_success_rate
        expr: "SUM(CASE WHEN APPEAL_STATUS = 'Won' THEN 1 ELSE 0 END) * 100.0 / NULLIF(SUM(CASE WHEN APPEAL_STATUS != 'Not Appealed' THEN 1 ELSE 0 END), 0)"
        description: Percentage of appealed denials successfully overturned
        synonyms:
          - appeal win rate
    time_dimensions:
      - name: denial_date_time
        expr: TRY_TO_DATE(DENIAL_DATE, 'YYYY-MM-DD')
        description: Denial date as a date type

  - name: CHARGES
    base_table:
      database: RCM_ANALYTICS
      schema: SILVER
      table: CHARGES
    description: >
      Line-item charges per encounter at CPT code granularity. Drives charge lag
      analysis and CPT-level revenue reporting.
    dimensions:
      - name: CHARGE_ID
        expr: CHARGE_ID
        description: Unique charge line identifier
        unique: true
      - name: ENCOUNTER_ID
        expr: ENCOUNTER_ID
        description: Reference to the encounter
      - name: CPT_CODE
        expr: CPT_CODE
        description: CPT procedure code
        synonyms:
          - procedure code
      - name: CPT_DESCRIPTION
        expr: CPT_DESCRIPTION
        description: Description of the CPT code
      - name: UNITS
        expr: UNITS
        description: Number of units billed
      - name: CHARGE_AMOUNT
        expr: CHARGE_AMOUNT
        description: Charge amount per line item in USD
      - name: SERVICE_DATE
        expr: SERVICE_DATE
        description: Date of service (YYYY-MM-DD)
      - name: POST_DATE
        expr: POST_DATE
        description: Date charge was posted to the billing system (YYYY-MM-DD)
      - name: ICD10_CODE
        expr: ICD10_CODE
        description: ICD-10 diagnosis code
        synonyms:
          - diagnosis code
    measures:
      - name: total_charge_amount
        expr: SUM(CHARGE_AMOUNT)
        description: Sum of all line-item charges in USD
      - name: total_units
        expr: SUM(UNITS)
        description: Total units billed
      - name: charge_line_count
        expr: COUNT(*)
        description: Number of charge lines
    time_dimensions:
      - name: service_date_time
        expr: TRY_TO_DATE(SERVICE_DATE, 'YYYY-MM-DD')
        description: Service date as a date type

  - name: ADJUSTMENTS
    base_table:
      database: RCM_ANALYTICS
      schema: SILVER
      table: ADJUSTMENTS
    description: >
      Contractual write-offs and balance adjustments. Drives net collection rate
      and bad debt rate calculations.
    dimensions:
      - name: ADJUSTMENT_ID
        expr: ADJUSTMENT_ID
        description: Unique adjustment identifier
        unique: true
      - name: CLAIM_ID
        expr: CLAIM_ID
        description: Reference to the adjusted claim
      - name: ADJUSTMENT_TYPE_CODE
        expr: ADJUSTMENT_TYPE_CODE
        description: "Type: CONTRACTUAL, WRITEOFF, ADMIN, PROMPT_PAY, CHARITY, SMALL_BAL"
        synonyms:
          - adjustment type
      - name: ADJUSTMENT_TYPE_DESCRIPTION
        expr: ADJUSTMENT_TYPE_DESCRIPTION
        description: Human-readable adjustment type description
      - name: ADJUSTMENT_AMOUNT
        expr: ADJUSTMENT_AMOUNT
        description: Adjustment amount in USD
      - name: ADJUSTMENT_DATE
        expr: ADJUSTMENT_DATE
        description: Date the adjustment was posted (YYYY-MM-DD)
    measures:
      - name: total_adjustments
        expr: SUM(ADJUSTMENT_AMOUNT)
        description: Sum of all adjustments in USD
      - name: bad_debt_total
        expr: "SUM(CASE WHEN ADJUSTMENT_TYPE_CODE = 'WRITEOFF' THEN ADJUSTMENT_AMOUNT ELSE 0 END)"
        description: Total bad debt write-offs in USD
        synonyms:
          - write-offs
          - bad debt
      - name: contractual_total
        expr: "SUM(CASE WHEN ADJUSTMENT_TYPE_CODE = 'CONTRACTUAL' THEN ADJUSTMENT_AMOUNT ELSE 0 END)"
        description: Total contractual adjustments in USD
    time_dimensions:
      - name: adjustment_date_time
        expr: TRY_TO_DATE(ADJUSTMENT_DATE, 'YYYY-MM-DD')
        description: Adjustment date as a date type

  - name: OPERATING_COSTS
    base_table:
      database: RCM_ANALYTICS
      schema: SILVER
      table: OPERATING_COSTS
    description: >
      Monthly RCM department operating costs. Drives cost-to-collect calculation
      (total RCM cost / total collections). Benchmark: ≤ 3%.
    dimensions:
      - name: PERIOD
        expr: PERIOD
        description: "Month in YYYY-MM format"
        unique: true
        synonyms:
          - month
      - name: BILLING_STAFF_COST
        expr: BILLING_STAFF_COST
        description: Monthly billing staff salary cost in USD
      - name: SOFTWARE_COST
        expr: SOFTWARE_COST
        description: Monthly EHR/billing software cost in USD
      - name: OUTSOURCING_COST
        expr: OUTSOURCING_COST
        description: Monthly third-party billing cost in USD
      - name: SUPPLIES_OVERHEAD
        expr: SUPPLIES_OVERHEAD
        description: Monthly supplies and overhead cost in USD
      - name: TOTAL_RCM_COST
        expr: TOTAL_RCM_COST
        description: Total monthly RCM department cost in USD
    measures:
      - name: total_rcm_cost
        expr: SUM(TOTAL_RCM_COST)
        description: Sum of all RCM operating costs in USD
        synonyms:
          - operating cost
          - billing cost

  # =========================================================================
  # Dimension Tables (use columns only — no measures/time_dimensions)
  # =========================================================================

  - name: PAYERS
    base_table:
      database: RCM_ANALYTICS
      schema: SILVER
      table: PAYERS
    description: >
      Insurance payer master list. Reference dimension for payer analysis,
      payer mix reporting, and denial rate by payer.
    columns:
      - name: PAYER_ID
        description: Unique payer identifier
        unique: true
      - name: PAYER_NAME
        description: Insurance company name
        synonyms:
          - payer
          - insurance
          - insurer
      - name: PAYER_TYPE
        description: "Category: Commercial, Government, or Self-Pay"
        synonyms:
          - insurance type
      - name: AVG_REIMBURSEMENT_PCT
        description: Average contracted reimbursement percentage
      - name: CONTRACT_ID
        description: Payer contract identifier

  - name: PATIENTS
    base_table:
      database: RCM_ANALYTICS
      schema: SILVER
      table: PATIENTS
    description: >
      Patient demographics. Reference dimension for patient-level analysis.
    columns:
      - name: PATIENT_ID
        description: Unique patient identifier
        unique: true
      - name: FIRST_NAME
        description: Patient first name (PII)
      - name: LAST_NAME
        description: Patient last name (PII)
      - name: DATE_OF_BIRTH
        description: Patient date of birth (PII)
      - name: GENDER
        description: Patient gender (M/F)
      - name: PRIMARY_PAYER_ID
        description: Reference to the patient primary insurance payer
      - name: MEMBER_ID
        description: Insurance member ID (PII)
      - name: ZIP_CODE
        description: Patient zip code (PII)

  - name: PROVIDERS
    base_table:
      database: RCM_ANALYTICS
      schema: SILVER
      table: PROVIDERS
    description: >
      Clinician roster. Reference dimension for provider performance
      scorecards and department-level analysis.
    columns:
      - name: PROVIDER_ID
        description: Unique provider identifier
        unique: true
      - name: PROVIDER_NAME
        description: Provider name (Dr. First Last)
        synonyms:
          - doctor
          - physician
      - name: NPI
        description: National Provider Identifier (10-digit)
      - name: DEPARTMENT
        description: Clinical department
      - name: SPECIALTY
        description: Medical specialty

  - name: ENCOUNTERS
    base_table:
      database: RCM_ANALYTICS
      schema: SILVER
      table: ENCOUNTERS
    description: >
      Patient visits/encounters. Links patients and providers to downstream
      charges and claims.
    dimensions:
      - name: ENCOUNTER_ID
        expr: ENCOUNTER_ID
        description: Unique encounter identifier
        unique: true
        synonyms:
          - visit
      - name: PATIENT_ID
        expr: PATIENT_ID
        description: Reference to the patient
      - name: PROVIDER_ID
        expr: PROVIDER_ID
        description: Reference to the provider
      - name: DATE_OF_SERVICE
        expr: DATE_OF_SERVICE
        description: Date of the encounter (YYYY-MM-DD)
      - name: DISCHARGE_DATE
        expr: DISCHARGE_DATE
        description: Discharge date for inpatient stays (YYYY-MM-DD)
      - name: ENCOUNTER_TYPE
        expr: ENCOUNTER_TYPE
        description: "Type: Outpatient, Inpatient, Emergency, Telehealth"
        synonyms:
          - visit type
      - name: DEPARTMENT
        expr: DEPARTMENT
        description: Clinical department where encounter occurred
    measures:
      - name: total_encounters
        expr: COUNT(DISTINCT ENCOUNTER_ID)
        description: Total number of unique encounters
        synonyms:
          - visit count
    time_dimensions:
      - name: encounter_date
        expr: TRY_TO_DATE(DATE_OF_SERVICE, 'YYYY-MM-DD')
        description: Encounter date as a date type

# =========================================================================
# Relationships (joins between tables)
# =========================================================================
relationships:
  - name: claims_to_encounters
    left_table: CLAIMS
    right_table: ENCOUNTERS
    relationship_type: many_to_one
    relationship_columns:
      - left_column: ENCOUNTER_ID
        right_column: ENCOUNTER_ID
  - name: claims_to_payers
    left_table: CLAIMS
    right_table: PAYERS
    relationship_type: many_to_one
    relationship_columns:
      - left_column: PAYER_ID
        right_column: PAYER_ID
  - name: claims_to_patients
    left_table: CLAIMS
    right_table: PATIENTS
    relationship_type: many_to_one
    relationship_columns:
      - left_column: PATIENT_ID
        right_column: PATIENT_ID
  - name: payments_to_claims
    left_table: PAYMENTS
    right_table: CLAIMS
    relationship_type: many_to_one
    relationship_columns:
      - left_column: CLAIM_ID
        right_column: CLAIM_ID
  - name: payments_to_payers
    left_table: PAYMENTS
    right_table: PAYERS
    relationship_type: many_to_one
    relationship_columns:
      - left_column: PAYER_ID
        right_column: PAYER_ID
  - name: denials_to_claims
    left_table: DENIALS
    right_table: CLAIMS
    relationship_type: many_to_one
    relationship_columns:
      - left_column: CLAIM_ID
        right_column: CLAIM_ID
  - name: adjustments_to_claims
    left_table: ADJUSTMENTS
    right_table: CLAIMS
    relationship_type: many_to_one
    relationship_columns:
      - left_column: CLAIM_ID
        right_column: CLAIM_ID
  - name: charges_to_encounters
    left_table: CHARGES
    right_table: ENCOUNTERS
    relationship_type: many_to_one
    relationship_columns:
      - left_column: ENCOUNTER_ID
        right_column: ENCOUNTER_ID
  - name: encounters_to_patients
    left_table: ENCOUNTERS
    right_table: PATIENTS
    relationship_type: many_to_one
    relationship_columns:
      - left_column: PATIENT_ID
        right_column: PATIENT_ID
  - name: encounters_to_providers
    left_table: ENCOUNTERS
    right_table: PROVIDERS
    relationship_type: many_to_one
    relationship_columns:
      - left_column: PROVIDER_ID
        right_column: PROVIDER_ID
  - name: patients_to_payers
    left_table: PATIENTS
    right_table: PAYERS
    relationship_type: many_to_one
    relationship_columns:
      - left_column: PRIMARY_PAYER_ID
        right_column: PAYER_ID
